<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AetherSeed</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@200;300;400&display=swap" rel="stylesheet" />
</head>
<body>
  <canvas id="aether-canvas"></canvas>

  <!-- Overlay UI -->
  <div id="ui-overlay">
    <div id="title-group">
      <h1 id="title">AetherSeed</h1>
      <p id="subtitle">Type a word. Grow a dream.</p>
    </div>
    <form id="seed-form">
      <div id="input-wrapper">
        <input
          id="seed-input"
          type="text"
          placeholder="Enter any word…"
          autocomplete="off"
          spellcheck="false"
          aria-label="Seed word"
        />
        <button id="seed-submit" type="submit">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>
    </form>
    <div id="hint-bar">
      <span class="hint"><kbd>R</kbd> randomize</span>
      <span class="hint"><kbd>Space</kbd> mutate</span>
      <span class="hint"><kbd>S</kbd> screenshot</span>
      <span class="hint"><kbd>A</kbd> attractor</span>
      <span class="hint"><kbd>C</kbd> color shift</span>
      <span class="hint"><kbd>P</kbd> performance</span>
      <span class="hint"><kbd>↑↓</kbd> particles</span>
    </div>
  </div>

  <!-- Current seed display (shown during animation) -->
  <div id="seed-display" class="hidden">
    <span id="current-seed-label"></span>
  </div>

  <!-- Stats display -->
  <div id="stats-display" class="hidden">
    <span id="fps-counter">FPS: --</span>
    <span id="particle-counter">Particles: --</span>
  </div>

  <!-- Audio toggle -->
  <button id="audio-toggle" class="hidden" title="Toggle audio">
    <svg id="audio-on-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
    </svg>
    <svg id="audio-off-icon" class="hidden" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <line x1="23" y1="9" x2="17" y2="15"></line>
      <line x1="17" y1="9" x2="23" y2="15"></line>
    </svg>
  </button>

  <!-- Scripts -->
  <script src="utils.js"></script>
  <script src="seedEngine.js"></script>
  <script src="visualElements.js"></script>
  <script src="sceneGenerator.js"></script>
  <script src="interaction.js"></script>
  <script src="audio.js"></script>
  <script src="main.js"></script>
</body>
</html>
